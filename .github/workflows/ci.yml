name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust — fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux WebView deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  integration:
    name: Integration — LDAP against OpenLDAP
    runs-on: ubuntu-latest
    services:
      openldap:
        image: bitnami/openldap:2.6
        ports:
          - 3389:1389
        env:
          LDAP_ROOT: "dc=ldapex,dc=test"
          LDAP_ADMIN_USERNAME: admin
          LDAP_ADMIN_PASSWORD: admin
          LDAP_SKIP_DEFAULT_TREE: "yes"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for OpenLDAP
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/3389) 2>/dev/null; then
              echo "OpenLDAP is up"; exit 0
            fi
            sleep 1
          done
          echo "OpenLDAP did not come up"; exit 1
      - name: Seed fixture data
        run: |
          sudo apt-get update
          sudo apt-get install -y ldap-utils
          ldapadd -x -H ldap://127.0.0.1:3389 \
            -D "cn=admin,dc=ldapex,dc=test" -w admin \
            -f docker/openldap/seed.ldif
      - run: cargo test -p ldapex-core --features integration-tests -- --nocapture

  frontend:
    name: Frontend — lint / typecheck / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run build

  bundle:
    name: Bundle Tauri — ${{ matrix.os }}
    needs: [rust, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Linux WebView deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            pkg-config
      - run: npm --prefix frontend ci
      - run: cargo build --release -p ldapex-app

  user-docs:
    name: User guide — mdBook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - run: mdbook build docs/user-guide
