name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish under (e.g. v0.1.0-rc1). The workflow will create the release if it does not exist yet.'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  bundle:
    name: Bundle Tauri — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebView deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Build Tauri bundles
        run: cargo tauri build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          files: |
            crates/ldapex-app/target/release/bundle/nsis/*.exe
            crates/ldapex-app/target/release/bundle/msi/*.msi
            crates/ldapex-app/target/release/bundle/dmg/*.dmg
            crates/ldapex-app/target/release/bundle/appimage/*.AppImage
            crates/ldapex-app/target/release/bundle/deb/*.deb
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/dmg/*.dmg
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
